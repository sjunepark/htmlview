<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>htmlview origin fixture</title>
    <link rel="stylesheet" href="/assets/root.css" />
  </head>
  <body>
    <h1 id="title">fixture</h1>
    <output id="result">pending</output>
    <section hidden>
      <style>
        /* STYLE_SOURCE_CANARY_MUST_NOT_PERSIST */
      </style>
      <template>TEMPLATE_SOURCE_CANARY_MUST_NOT_PERSIST</template>
      <input value="INPUT_VALUE_CANARY_MUST_NOT_PERSIST" />
      <textarea>TEXTAREA_VALUE_CANARY_MUST_NOT_PERSIST</textarea>
      <select>
        <option>SELECT_VALUE_CANARY_MUST_NOT_PERSIST</option>
      </select>
      <button type="button">BUTTON_VISIBLE_CANARY</button>
      <a
        href="https://user:password@example.invalid/CREDENTIAL_URL_CANARY"
        data-secret="DATA_ATTRIBUTE_CANARY_MUST_NOT_PERSIST"
        >BENIGN_LINK_TEXT</a
      >
    </section>
    <script>
      // INLINE_SCRIPT_CANARY_MUST_NOT_PERSIST
      (async () => {
        const within = (promise) =>
          Promise.race([
            promise,
            new Promise((_, reject) =>
              setTimeout(() => reject(new Error("timeout")), 1000),
            ),
          ]);
        const results = {
          protocol: location.protocol,
          rootStyle: getComputedStyle(document.documentElement)
            .getPropertyValue("--root-asset")
            .trim(),
        };
        try {
          const module = await within(import("./module ü.js"));
          results.module = module.value;
        } catch (error) {
          results.module = `error:${error.name}`;
        }
        try {
          results.fetch = (await within(fetch("./data space.json"))).status;
        } catch (error) {
          results.fetch = `error:${error.name}`;
        }
        try {
          results.unreferenced = await (
            await within(fetch("/.hidden.txt"))
          ).text();
        } catch (error) {
          results.unreferenced = `error:${error.name}`;
        }
        document.querySelector("#result").textContent = JSON.stringify(results);
        window.fixtureResults = results;
      })();
    </script>
  </body>
</html>
